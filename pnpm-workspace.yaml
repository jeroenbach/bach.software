publicHoistPattern:
  - lodash-unified
  - '@plausible-analytics/tracker'
  - '@nuxtjs/mdc'
shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar
  - semver
  - tinyclip
  - tinyexec
  - ast-v8-to-istanbul

allowBuilds:
  '@parcel/watcher': true
  better-sqlite3: true
  esbuild: true
  sharp: true
  workerd: true
