name: Build, Deploy & Playwright

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build_job:
    runs-on: ubuntu-latest
    name: Build Job
    steps:
      - name: Set timezone
        run: sudo timedatectl set-timezone Europe/Amsterdam

      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-build-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Site
        run: pnpm build

      - name: Zip generated site (no compression)
        run: zip -r -0 generated-site.zip dist

      - name: Upload zipped site
        uses: actions/upload-artifact@v4
        with:
          name: generated-site-zip
          path: generated-site.zip

  deploy_job:
    needs: build_job
    runs-on: ubuntu-latest
    name: Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Download zipped site
        uses: actions/download-artifact@v4
        with:
          name: generated-site-zip
          path: .

      - name: Unzip generated site
        run: unzip generated-site.zip

      - name: Deploy
        id: builddeploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=bach-software --branch=${{ github.ref_name }}

  playwright_job:
    needs: build_job
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.56.0-jammy
      options: --user root
    env:
      HOME: /root
    name: Perform Playwright Tests
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install unzip
        run: apt-get update && apt-get install -y unzip

      # - name: Install Playwright Browsers
      #   run: pnpm exec playwright install --with-deps

      - name: Download zipped site
        uses: actions/download-artifact@v4
        with:
          name: generated-site-zip
          path: .

      - name: Unzip generated site
        run: unzip generated-site.zip

      - name: Run Playwright tests
        run: pnpm ci:playwright

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 5

      - name: Upload test-results
        uses: actions/upload-artifact@v4
        if: ${{ always() && !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 2
